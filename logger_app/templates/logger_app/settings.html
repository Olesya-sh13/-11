<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Настройки безопасности</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fef7e8; padding: 30px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; border: 1px solid #ffebd2; }
        h2 { color: #2c2b28; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #5a3e2a; }
        input { width: 100%; padding: 8px; border: 1px solid #ffdbbc; border-radius: 10px; }
        button { background: #ffd6b3; padding: 10px 20px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ffc48a; }
        a { display: inline-block; margin-top: 20px; color: #5a3e2a; }
    </style>
</head>
<body>
<div class="container">
    <h2> Настройки контейнера безопасности</h2>
    <form method="post" action="/logger/settings/?t={{ token }}">
        <input type="hidden" name="t" value="{{ token }}">
        <div class="form-group">
            <label>Базовая частота (запросов в секунду):</label>
            <input type="number" name="base_frequency" value="{{ base_freq }}" min="1" step="1" required>
        </div>
        <div class="form-group">
            <label>Процент небольшого превышения (для порога критичности):</label>
            <input type="number" name="minor_overhead" value="{{ minor_overhead }}" min="0" max="100" step="1" required>
        </div>
        <div class="form-group">
            <label>Время временной блокировки (секунд):</label>
            <input type="number" name="block_seconds" value="{{ block_sec }}" min="0" step="1" required>
        </div>
        <button type="submit">Сохранить</button>
    </form>
    <p><a href="/logger/?t={{ token }}">← Назад на дашборд</a></p>
</div>
</body>
</html>
