<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему безопасности</title>

    <style>
        /* Сброс отступов и единая модель блоков */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Страница входа: светлый фон, форма точно по центру экрана */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fef7e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Белая карточка формы входа */
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            border: 1px solid #ffebd2;
        }

        h1 { color: #2c2b28; margin-bottom: 8px; font-size: 24px; }

        /* Подзаголовок-подсказка под основным заголовком */
        .subtitle { color: #7a6242; margin-bottom: 30px; font-size: 14px; }

        /* Группа поля: отступ между полем «Логин» и полем «Пароль» */
        .form-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; color: #5a3e2a; font-weight: 500; }

        /* Поля ввода: одинаковый стиль для логина и пароля */
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ffdbbc;
            border-radius: 12px;
            font-size: 14px;
            background: #fefdf9;
        }

        /* Кнопка «Войти» на всю ширину карточки */
        button {
            width: 100%;
            padding: 12px;
            background: #ffd6b3;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            color: #5a3e2a;
            cursor: pointer;
        }
        button:hover { background: #ffc48a; }

        /* Блок ошибки (неверный логин/пароль) — красноватый фон */
        .error {
            background: #ffe6e5;
            color: #bc3f2e;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* Блок со справочными учётными данными под формой */
        .info {
            margin-top: 25px;
            font-size: 12px;
            color: #7a6242;
            border-top: 1px solid #ffebd2;
            padding-top: 15px;
        }

        /* Таблица тестовых аккаунтов */
        table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 10px; }
        td, th { padding: 6px; text-align: left; }
        tr { border-bottom: 1px solid #ffebd2; }
    </style>
</head>
<body>
    <!-- КАРТОЧКА ВХОДА -->
    <div class="login-container">
        <h1>🔒 Контейнер безопасности</h1>
        <div class="subtitle">Введите учётные данные для доступа к журналу событий</div>

        <!-- Ошибка авторизации: показывается, если Django вернул ошибки формы -->
        {% if form.errors %}
            <div class="error">⚠️ Неверное имя пользователя или пароль</div>
        {% endif %}

        <!-- Форма входа: POST на тот же URL.
             Django требует {% csrf_token %} для защиты от межсайтовых подделок запросов. -->
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Имя пользователя</label>
                <!-- autofocus — курсор сразу попадает в это поле при загрузке страницы -->
                <input type="text" name="username" autofocus required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <!-- type="password" скрывает вводимые символы -->
                <input type="password" name="password" required>
            </div>
            <button type="submit">Войти</button>
        </form>

        <!-- Справочная таблица тестовых аккаунтов (для демонстрации системы) -->
        <div class="info">
            <strong>Тестовые учётные записи:</strong>
            <table>
                <tr><th>Логин</th><th>Пароль</th><th>Роль</th></tr>
                <tr><td>admin</td><td>Admin2024!</td><td>Администратор (полный доступ)</td></tr>
                <tr><td>auditor</td><td>audit2024</td><td>Аудитор (только чтение)</td></tr>
            </table>
        </div>
    </div>
</body>
</html>
